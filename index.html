<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Planfit40</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
:root{
  --bg:#2A0A3D;--bg2:#3D1060;--bg3:#1A0629;
  --purple:#5B1A8B;--purple-l:#7B2AB8;
  --accent:#C84DFF;--pink:#FF4FD8;
  --white:#FFFFFF;--gray:#CFCFCF;--gray2:#9A9A9A;
  --surf:rgba(255,255,255,0.07);--surf2:rgba(255,255,255,0.12);
  --bdr:rgba(200,77,255,0.18);--bdr2:rgba(200,77,255,0.35);
  --grad:linear-gradient(135deg,#C84DFF,#FF4FD8);
  --grad-bg:linear-gradient(160deg,#1A0629,#2A0A3D,#3D1060);
  --grad-card:linear-gradient(135deg,rgba(91,26,139,0.6),rgba(42,10,61,0.9));
  --urgent:#FF6B6B;--urgent-p:rgba(255,107,107,0.15);
  --gold:#FFD700;--gold-p:rgba(255,215,0,0.15);
  --r1:12px;--r2:16px;--r3:20px;--r4:28px;
  --s1:0 2px 12px rgba(0,0,0,0.25);--s2:0 4px 24px rgba(0,0,0,0.35);--s3:0 8px 40px rgba(0,0,0,0.45);
  --sp:0 6px 28px rgba(200,77,255,0.30);--sk:0 6px 28px rgba(255,79,216,0.25);
  --ease-spring:cubic-bezier(0.34,1.56,0.64,1);--ease-smooth:cubic-bezier(0.4,0,0.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;-webkit-font-smoothing:antialiased}
body{font-family:'DM Sans',sans-serif;background:var(--bg3);color:var(--white);overflow-x:hidden}
.app{max-width:430px;margin:0 auto;min-height:100%;background:var(--bg3)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--purple);border-radius:3px}
.fade-in{animation:pageIn 0.32s var(--ease-smooth)}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
.divider{height:1px;background:var(--bdr);margin:18px 0}
.empty{text-align:center;padding:44px 20px;color:var(--gray2)}
.empty-ic{font-size:34px;margin-bottom:9px}
.empty-tx{font-size:12px;font-weight:300;color:var(--gray)}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);
  background:var(--grad);color:#fff;padding:10px 22px;border-radius:100px;
  font-size:12px;font-weight:600;z-index:9999;animation:toA 2.8s var(--ease-smooth) forwards;
  white-space:nowrap;box-shadow:var(--sp);letter-spacing:0.2px}
@keyframes toA{0%{opacity:0;top:14px}15%{opacity:1;top:24px}70%{opacity:1;top:24px}100%{opacity:0;top:14px}}

/* LOGIN */
.login{min-height:100vh;background:var(--grad-bg);display:flex;flex-direction:column;align-items:center;padding:0 20px 60px;position:relative;overflow:hidden}
.login::before{content:'';position:absolute;width:400px;height:400px;border-radius:50%;top:-120px;right:-130px;background:radial-gradient(circle,rgba(200,77,255,0.15) 0%,transparent 65%);pointer-events:none}
.login::after{content:'';position:absolute;width:300px;height:300px;border-radius:50%;bottom:-80px;left:-80px;background:radial-gradient(circle,rgba(255,79,216,0.12) 0%,transparent 65%);pointer-events:none}
.lang-row{display:flex;gap:5px;justify-content:center;padding-top:24px;margin-bottom:4px;position:relative;z-index:2}
.lbtn{padding:5px 13px;border-radius:100px;border:1px solid rgba(200,77,255,0.25);background:rgba(255,255,255,0.05);color:rgba(207,207,207,0.6);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
.lbtn.on{background:rgba(200,77,255,0.20);border-color:rgba(200,77,255,0.7);color:var(--accent)}
.login-hero{padding-top:16px;text-align:center;margin-bottom:26px;position:relative;z-index:2}
.login-logo{max-width:160px;width:100%;height:auto;margin:0 auto 16px;display:block;mix-blend-mode:multiply}
.login-tag{font-size:10px;color:rgba(200,77,255,0.75);margin-top:8px;letter-spacing:3.5px;text-transform:uppercase;font-weight:400}
.card{background:rgba(255,255,255,0.06);border:1px solid var(--bdr);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:var(--r4);padding:28px 22px 24px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,0.45);position:relative;z-index:2}
.card-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--white);margin-bottom:3px}
.card-sub{font-size:12px;color:var(--gray);margin-bottom:24px;font-weight:300;line-height:1.6}
.fl{display:block;font-size:10px;font-weight:600;color:var(--gray);margin-bottom:5px;letter-spacing:1px;text-transform:uppercase}
.fi{width:100%;padding:12px 15px;border:1.5px solid var(--bdr);border-radius:var(--r1);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--white);background:rgba(255,255,255,0.06);outline:none;transition:border-color 0.2s,box-shadow 0.2s;margin-bottom:14px}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,77,255,0.15)}
.fi::placeholder{color:var(--gray2)}
.lvl-sec{margin-bottom:22px}
.lvl-sec-lbl{font-size:10px;font-weight:600;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.lvl-group{margin-bottom:10px}
.lvl-group-name{font-size:9px;font-weight:700;color:var(--accent);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:5px;padding-left:9px;border-left:2px solid rgba(200,77,255,0.5)}
.lo{display:flex;align-items:center;gap:9px;padding:8px 11px;border:1.5px solid var(--bdr);border-radius:var(--r1);cursor:pointer;transition:all 0.18s;background:rgba(255,255,255,0.04);margin-bottom:5px}
.lo:hover{border-color:rgba(200,77,255,0.5);background:rgba(200,77,255,0.08)}
.lo.on{border-color:var(--accent);background:rgba(200,77,255,0.15);box-shadow:0 2px 14px rgba(200,77,255,0.20)}
.lo-rb{width:16px;height:16px;border-radius:50%;border:2px solid var(--gray2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.18s}
.lo.on .lo-rb{border-color:var(--accent);background:var(--grad)}
.lo.on .lo-rb::after{content:'';width:5px;height:5px;border-radius:50%;background:#fff}
.lo-ico{font-size:16px;flex-shrink:0}
.lo-nm{font-size:12px;font-weight:500;color:var(--white);line-height:1.2}
.lo-ds{font-size:10px;color:var(--gray);margin-top:1px;font-weight:300}
.btn-go{width:100%;padding:15px;border:none;border-radius:var(--r2);background:var(--grad);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:0.3px;box-shadow:var(--sp);transition:all 0.2s;margin-top:4px}
.btn-go:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(200,77,255,0.45)}
.btn-go:active{transform:none}
.btn-go:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.err{font-size:12px;color:var(--urgent);text-align:center;margin:8px 0 4px}

/* LAYOUT */
.page{padding-bottom:90px;min-height:100vh;background:var(--bg3)}
.pc{padding:0 16px}

/* HEADER */
.hdr{padding:52px 16px 0}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
.hdr-eye{font-size:10px;font-weight:600;color:var(--accent);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:3px}
.hdr-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--white);line-height:1.05}
.hdr-date{font-size:11px;color:var(--gray);margin-top:4px;font-weight:300}

/* TREINO CARD */
.treino-card{border-radius:var(--r3);padding:22px 20px;margin-bottom:18px;position:relative;overflow:hidden;cursor:pointer;border:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif;background:linear-gradient(145deg,var(--bg) 0%,var(--bg2) 50%,#4A1070 100%);border:1.5px solid rgba(200,77,255,0.40);box-shadow:0 12px 48px rgba(0,0,0,0.45);transition:all 0.25s var(--ease-spring)}
.treino-card:hover{transform:translateY(-3px);box-shadow:0 18px 56px rgba(0,0,0,0.50),0 0 32px rgba(200,77,255,0.20);border-color:var(--accent)}
.treino-card:active{transform:scale(0.985)}
.treino-card::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(200,77,255,0.20) 0%,transparent 70%);pointer-events:none}
.treino-eyebrow{font-size:9px;font-weight:700;color:rgba(200,77,255,0.80);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}
.treino-level-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.treino-icon{font-size:36px;line-height:1;flex-shrink:0}
.treino-name{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--white);line-height:1.1}
.treino-desc{font-size:11px;color:rgba(255,255,255,0.55);font-weight:300;margin-top:3px}
.treino-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:var(--r2);background:var(--grad);color:#fff;font-size:14px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;box-shadow:0 4px 20px rgba(200,77,255,0.40);margin-bottom:14px}
.treino-bar-bg{background:rgba(255,255,255,0.10);border-radius:100px;height:5px;overflow:hidden;margin-bottom:6px}
.treino-bar-fill{height:100%;border-radius:100px;background:var(--grad);transition:width 1.3s var(--ease-spring);position:relative;overflow:hidden}
.treino-foot{display:flex;justify-content:space-between;align-items:center}
.treino-streak{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:rgba(255,255,255,0.65)}
.treino-ct{font-size:11px;font-weight:700;color:var(--accent)}

/* SECTION TITLES */
.sec{margin-bottom:6px}
.sec-t{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:var(--white)}
.sec-s{font-size:11px;color:var(--gray);margin-top:2px;margin-bottom:13px;font-weight:300}

/* LEVEL CARDS */
.lvl-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.lc{border-radius:var(--r2);padding:14px 16px;display:flex;align-items:center;gap:12px;transition:all 0.22s;border:1.5px solid var(--bdr);background:rgba(255,255,255,0.05);cursor:default;position:relative;overflow:hidden}
.lc.open{background:linear-gradient(135deg,rgba(200,77,255,0.12),rgba(255,79,216,0.08));border-color:rgba(200,77,255,0.40);box-shadow:var(--s2);cursor:pointer}
.lc.open:hover{transform:translateY(-2px);box-shadow:var(--sp);border-color:var(--accent)}
.lc.open:active{transform:scale(0.985)}
.lc.done{background:linear-gradient(135deg,rgba(91,26,139,0.25),rgba(42,10,61,0.4));border-color:rgba(200,77,255,0.20);opacity:0.80;cursor:pointer}
.lc.done:hover{opacity:1;box-shadow:var(--sp);border-color:rgba(200,77,255,0.45)}
.lc.lock{background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.06);opacity:0.45;cursor:pointer}
.lc.lock:hover{opacity:0.7}
.lc.spec{background:linear-gradient(135deg,rgba(200,77,255,0.10),rgba(255,79,216,0.07));border-color:rgba(255,79,216,0.30);box-shadow:var(--s1);cursor:pointer}
.lc.spec:hover{transform:translateY(-2px);box-shadow:var(--sk);border-color:var(--pink)}
.lc.spec:active{transform:scale(0.985)}
.lc-ico-wrap{width:44px;height:44px;border-radius:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.lc.open .lc-ico-wrap{background:rgba(200,77,255,0.18)}
.lc.done .lc-ico-wrap{background:rgba(91,26,139,0.30)}
.lc.lock .lc-ico-wrap{background:rgba(255,255,255,0.06)}
.lc.spec .lc-ico-wrap{background:rgba(255,79,216,0.15)}
.lc.unlocked-paid .lc-ico-wrap{background:rgba(200,77,255,0.25)}
.lc-body{flex:1;min-width:0}
.lc-name{font-size:14px;font-weight:600;color:var(--white);line-height:1.2;margin-bottom:2px}
.lc.lock .lc-name{color:var(--gray2)}
.lc-desc{font-size:11px;color:var(--gray);font-weight:300}
.lc-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:100px;font-size:9px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase}
.badge-open{background:rgba(200,77,255,0.18);color:var(--accent)}
.badge-done{background:rgba(91,26,139,0.40);color:rgba(207,207,207,0.9)}
.badge-lock{background:rgba(255,255,255,0.06);color:var(--gray2)}
.badge-progress{background:var(--grad);color:#fff;box-shadow:0 2px 10px rgba(200,77,255,0.35)}
.badge-spec{background:rgba(255,79,216,0.18);color:var(--pink)}
.badge-vip{background:linear-gradient(135deg,#FFD700,#FFA500);color:#1A0629}
.lc-arrow{font-size:13px;color:var(--accent)}
.lc-arrow-g{font-size:13px;color:var(--pink)}
.lock-ct{font-size:10px;color:var(--gray2);font-weight:300;text-align:right}
.lock-ct.urgent{color:var(--urgent);font-weight:600}
.lc-prog-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(200,77,255,0.08)}
.lc-prog-fill{height:100%;background:var(--grad);border-radius:0 3px 3px 0;transition:width 1s ease}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(26,6,41,0.97);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-top:1px solid var(--bdr);display:flex;padding:6px 0 18px;z-index:100;box-shadow:0 -4px 24px rgba(0,0,0,0.40)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;cursor:pointer;transition:all 0.18s;position:relative}
.ni:active{transform:scale(0.88)}
.ni-ic{font-size:18px;line-height:1;transition:transform 0.2s}
.ni-lb{font-size:8px;font-weight:500;color:var(--gray2);transition:color 0.2s;letter-spacing:0.2px;text-transform:uppercase;text-align:center;line-height:1.2}
.ni.on .ni-lb{color:var(--accent);font-weight:700}
.ni.on .ni-ic{transform:scale(1.1)}
.ni-dot{width:14px;height:2px;border-radius:2px;background:var(--grad);position:absolute;bottom:-2px;animation:dotIn 0.25s var(--ease-spring)}
@keyframes dotIn{from{width:0;opacity:0}to{width:14px;opacity:1}}

/* MODAIS */
.m-ov{position:fixed;inset:0;background:rgba(10,0,20,0.75);backdrop-filter:blur(12px);display:flex;align-items:flex-end;justify-content:center;z-index:200;animation:ovIn 0.2s ease}
@keyframes ovIn{from{opacity:0}to{opacity:1}}
.m-sh{background:linear-gradient(180deg,#2A0A3D,#1A0629);border:1px solid var(--bdr);border-radius:28px 28px 0 0;padding:12px 26px 52px;width:100%;max-width:430px;text-align:center;animation:shIn 0.35s var(--ease-spring)}
.m-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);margin:0 auto 28px}
@keyframes shIn{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.m-em{font-size:52px;margin-bottom:10px;display:block;animation:emIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.1s both}
@keyframes emIn{from{transform:scale(0.2);opacity:0}to{transform:scale(1);opacity:1}}
.m-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--white);margin-bottom:7px}
.m-sub{font-size:13px;color:var(--gray);line-height:1.7;margin-bottom:18px;font-weight:300;white-space:pre-line}
.m-badge{display:inline-flex;align-items:center;gap:6px;background:var(--grad);color:#fff;padding:10px 22px;border-radius:100px;font-size:13px;font-weight:600;margin-bottom:18px;box-shadow:var(--sp);animation:bdIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.2s both}
.m-badge-g{background:linear-gradient(135deg,var(--purple-l),var(--accent));box-shadow:var(--sp)}
@keyframes bdIn{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.m-bar-bg{background:rgba(255,255,255,0.10);border-radius:100px;height:5px;overflow:hidden;margin-bottom:16px}
.m-bar-f{height:100%;border-radius:100px;background:var(--grad);animation:barIn 1s cubic-bezier(0.34,1.56,0.64,1) 0.3s both}
@keyframes barIn{from{width:0%!important}}
.m-next{font-size:11px;color:var(--white);font-weight:500;margin-bottom:18px;background:rgba(200,77,255,0.15);border:1px solid var(--bdr);border-radius:8px;padding:8px 14px;display:inline-block}
.btn-mo{width:100%;padding:14px;border:none;border-radius:var(--r2);background:var(--grad);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;box-shadow:var(--sp);transition:all 0.18s var(--ease-smooth);margin-top:8px}
.btn-mo:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(200,77,255,0.45)}
.btn-mo:active{transform:scale(0.97)}
.btn-mo-g{background:linear-gradient(135deg,var(--purple-l),var(--accent))}
.btn-mo-outline{background:transparent;border:1.5px solid var(--bdr);color:var(--gray);box-shadow:none}
.btn-mo-outline:hover{border-color:var(--accent);color:var(--white)}

/* CONFETTI */
.cft{position:fixed;inset:0;pointer-events:none;z-index:199;overflow:hidden}
.cft-p{position:absolute;top:-10px;width:7px;height:7px;border-radius:2px;animation:cftF linear forwards}
@keyframes cftF{0%{transform:translateY(0) rotate(0);opacity:1}80%{opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.glow-v{position:fixed;inset:0;pointer-events:none;z-index:198;background:radial-gradient(ellipse at center,rgba(200,77,255,0.28) 0%,transparent 70%);animation:glowF 1.8s ease-in-out forwards}
@keyframes glowF{0%{opacity:0}30%{opacity:1}100%{opacity:0}}
.plus-fl{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;pointer-events:none;z-index:201;animation:flUp 1.6s ease-out forwards}
@keyframes flUp{0%{opacity:0;bottom:110px}20%{opacity:1}80%{opacity:1}100%{opacity:0;bottom:200px}}

/* LANG TOGGLE */
.lt{display:flex;gap:4px}
.ltb{padding:4px 11px;border-radius:100px;border:1.5px solid var(--bdr);background:transparent;color:var(--gray2);font-family:'DM Sans',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;cursor:pointer;transition:all 0.18s}
.ltb.on{border-color:var(--accent);color:var(--accent);background:rgba(200,77,255,0.12)}

/* HEADER RIGHT */
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.btn-logout{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:100px;border:1.5px solid rgba(255,107,107,0.25);background:rgba(255,107,107,0.08);color:rgba(255,107,107,0.75);font-family:'DM Sans',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
.btn-logout:hover{border-color:var(--urgent);color:var(--urgent);background:rgba(255,107,107,0.15)}

/* CHECK-IN CARD */
.ci-card{border-radius:var(--r3);padding:18px 20px;margin-bottom:18px;position:relative;overflow:hidden;cursor:pointer;border:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif;background:var(--grad);box-shadow:0 8px 36px rgba(200,77,255,0.40);transition:all 0.22s var(--ease-spring)}
.ci-card:hover{transform:translateY(-2px);box-shadow:0 14px 44px rgba(200,77,255,0.50)}
.ci-card:active{transform:scale(0.98)}
.ci-card.done{background:linear-gradient(135deg,rgba(91,26,139,0.50),rgba(42,10,61,0.80));box-shadow:var(--s1);border:1px solid var(--bdr);cursor:default}
.ci-card::before{content:'';position:absolute;top:-40px;right:-40px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,0.10);pointer-events:none}
.ci-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.ci-ico{font-size:28px;line-height:1;animation:ciIcoFloat 3s ease-in-out infinite}
@keyframes ciIcoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.ci-card.done .ci-ico{animation:none}
.ci-label{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:#fff;line-height:1.15}
.ci-sub{font-size:11px;color:rgba(255,255,255,0.75);font-weight:300;margin-top:2px}
.ci-bar-bg{background:rgba(255,255,255,0.18);border-radius:100px;height:4px;overflow:hidden}
.ci-bar-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,rgba(255,255,255,0.6),rgba(255,255,255,0.95));transition:width 1s var(--ease-spring)}
.ci-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.ci-foot-l{font-size:10px;color:rgba(255,255,255,0.65);font-weight:300}
.ci-foot-r{font-size:11px;color:rgba(255,255,255,0.90);font-weight:600}

/* CALENDÁRIO */
.cal-wrap{background:rgba(255,255,255,0.05);border:1px solid var(--bdr);border-radius:var(--r2);padding:16px;box-shadow:var(--s1);margin-bottom:18px}
.cal-title{font-size:11px;font-weight:600;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;background:rgba(255,255,255,0.06);color:var(--gray2);transition:all 0.2s}
.cal-day.treinou{background:var(--grad);color:#fff;box-shadow:0 2px 8px rgba(200,77,255,0.35)}
.cal-day.hoje{border:2px solid var(--accent);color:var(--accent);background:rgba(200,77,255,0.10);font-weight:700}
.cal-day.hoje.treinou{border:2px solid rgba(255,255,255,0.4);color:#fff;background:var(--grad)}
.cal-legend{display:flex;gap:14px;margin-top:10px;align-items:center}
.cal-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cal-legend-txt{font-size:10px;color:var(--gray2);font-weight:300}

/* AVATAR */
.av-img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.thread-av-img{width:40px;height:40px;border-radius:50%;border:2px solid var(--bdr);overflow:hidden;flex-shrink:0;background:rgba(200,77,255,0.15)}
.thread-av-img.vip{border-color:var(--gold)}
.thread-av-img img{width:100%;height:100%;object-fit:cover}

/* COMUNIDADE / THREADS FEED */
.thread-post{background:rgba(255,255,255,0.04);border-radius:var(--r2);padding:16px;margin-bottom:8px;border:1px solid var(--bdr);position:relative}
.thread-post-hdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.thread-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:rgba(200,77,255,0.15);border:2px solid var(--bdr)}
.thread-av-vip{border-color:var(--gold)}
.thread-meta{flex:1;min-width:0}
.thread-nm-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.thread-nm{font-size:14px;font-weight:600;color:var(--white);cursor:pointer;transition:color 0.15s}
.thread-nm:hover{color:var(--accent)}
.thread-vip-badge{display:inline-flex;align-items:center;gap:3px;background:linear-gradient(135deg,#FFD700,#FFA500);color:#1A0629;padding:2px 7px;border-radius:100px;font-size:9px;font-weight:700;letter-spacing:0.5px}
.thread-time{font-size:10px;color:var(--gray2);font-weight:300}
.thread-workout-label{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--accent);font-weight:600;margin-top:2px}
.thread-photo{width:100%;border-radius:12px;margin:10px 0;background:linear-gradient(135deg,rgba(91,26,139,0.4),rgba(42,10,61,0.6));min-height:180px;display:flex;align-items:center;justify-content:center;border:1px solid var(--bdr);overflow:hidden;position:relative}
.thread-photo img{width:100%;height:100%;object-fit:cover;border-radius:12px}
.thread-photo-placeholder{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--gray2);font-size:12px}
.thread-caption{font-size:13px;color:var(--gray);line-height:1.65;font-weight:300;margin-bottom:12px}
.thread-actions{display:flex;align-items:center;gap:18px}
.thread-action-btn{display:flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;color:var(--gray2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;transition:color 0.18s;padding:4px 0}
.thread-action-btn:hover{color:var(--white)}
.thread-action-btn.liked{color:var(--urgent)}
.thread-action-btn.liked .heart-ic{transform:scale(1.2)}
.heart-ic{transition:transform 0.2s var(--ease-spring);display:inline-block}
.thread-replies{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.06)}
.thread-reply{display:flex;gap:8px;margin-bottom:10px}
.thread-reply-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:rgba(200,77,255,0.10);border:1px solid var(--bdr);overflow:hidden}
.thread-reply-body{flex:1;min-width:0}
.thread-reply-nm{font-size:12px;font-weight:600;color:var(--white)}
.thread-reply-txt{font-size:12px;color:var(--gray);font-weight:300;line-height:1.5;margin-top:1px}
.thread-reply-time{font-size:9px;color:var(--gray2);margin-top:2px}
.thread-comment-input{display:flex;gap:8px;margin-top:10px;align-items:flex-end}
.thread-comment-input textarea{flex:1;padding:8px 12px;border:1.5px solid var(--bdr);border-radius:20px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--white);background:rgba(255,255,255,0.05);outline:none;resize:none;min-height:36px;max-height:80px;line-height:1.4;transition:border-color 0.2s}
.thread-comment-input textarea:focus{border-color:var(--accent)}
.thread-comment-input button{padding:6px 14px;border:none;border-radius:20px;background:var(--grad);color:#fff;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0}
.thread-reply-btn{background:none;border:none;cursor:pointer;color:var(--gray2);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;padding:2px 0;transition:color 0.18s;margin-top:2px}
.thread-reply-btn:hover{color:var(--accent)}
.thread-nested-replies{margin-top:8px;padding-left:12px;border-left:2px solid rgba(200,77,255,0.2)}
.thread-nested-reply{display:flex;gap:7px;margin-bottom:8px}
.thread-nested-reply-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;background:rgba(200,77,255,0.10);border:1px solid var(--bdr);overflow:hidden}
.thread-reply-input{display:flex;gap:7px;margin-top:6px;align-items:flex-end}
.thread-reply-input textarea{flex:1;padding:6px 10px;border:1.5px solid var(--bdr);border-radius:16px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--white);background:rgba(255,255,255,0.05);outline:none;resize:none;min-height:30px;max-height:60px;line-height:1.4;transition:border-color 0.2s}
.thread-reply-input textarea:focus{border-color:var(--accent)}
.thread-reply-input button{padding:5px 12px;border:none;border-radius:16px;background:var(--grad);color:#fff;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;cursor:pointer;flex-shrink:0}
.reg-btn{width:100%;padding:14px;border:none;border-radius:var(--r2);background:var(--grad);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;box-shadow:var(--sp);transition:all 0.2s;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px}
.reg-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(200,77,255,0.45)}
.reg-btn.done{background:linear-gradient(135deg,rgba(91,26,139,0.5),rgba(42,10,61,0.8));box-shadow:none;border:1px solid var(--bdr);cursor:default;color:var(--gray)}
.reg-btn.done:hover{transform:none;box-shadow:none}

/* POST FORM */
.post-form{background:rgba(255,255,255,0.05);border:1px solid var(--bdr);border-radius:var(--r3);padding:20px;margin-bottom:16px}
.post-form-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--white);margin-bottom:16px}
.photo-upload{width:100%;min-height:120px;border:2px dashed var(--bdr);border-radius:var(--r2);display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:12px;transition:border-color 0.2s;position:relative;overflow:hidden}
.photo-upload:hover{border-color:var(--accent)}
.photo-upload-inner{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--gray2);font-size:12px}
.photo-upload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.photo-preview{width:100%;border-radius:var(--r2);overflow:hidden;margin-bottom:12px}
.photo-preview img{width:100%;max-height:220px;object-fit:cover;display:block}
.f-ta{width:100%;padding:12px 14px;border:1.5px solid var(--bdr);border-radius:var(--r1);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--white);background:rgba(255,255,255,0.05);outline:none;resize:none;transition:border-color 0.2s;min-height:88px;font-weight:300}
.f-ta:focus{border-color:var(--accent);background:rgba(255,255,255,0.07)}
.f-sel{width:100%;padding:11px 14px;border:1.5px solid var(--bdr);border-radius:var(--r1);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--white);background:rgba(255,255,255,0.06);outline:none;cursor:pointer;margin-top:10px;appearance:none;-webkit-appearance:none}
.f-sel option{background:#2A0A3D;color:var(--white)}

/* SHARE CARD OVERLAY */
.share-ov{position:fixed;inset:0;background:rgba(10,0,20,0.85);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px;animation:ovIn 0.25s ease}
.share-card{background:linear-gradient(145deg,#2A0A3D,#3D1060);border:1.5px solid var(--bdr2);border-radius:var(--r3);padding:28px 24px;width:100%;max-width:360px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,0.6)}
.share-card-logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--accent);margin-bottom:16px;letter-spacing:1px}
.share-card-workout{font-size:32px;margin-bottom:8px}
.share-card-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--white);margin-bottom:4px}
.share-card-sub{font-size:12px;color:var(--gray);font-weight:300;margin-bottom:18px}
.share-btns{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.share-btn{display:flex;align-items:center;gap:6px;padding:10px 16px;border-radius:100px;border:1.5px solid var(--bdr);background:rgba(255,255,255,0.07);color:var(--white);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.18s}
.share-btn:hover{background:rgba(255,255,255,0.13);border-color:var(--accent)}
.share-btn-ig{border-color:rgba(200,77,255,0.4);background:rgba(200,77,255,0.10)}
.share-btn-wa{border-color:rgba(37,211,102,0.4);background:rgba(37,211,102,0.10)}

/* PROGRAMAS EXTRAS */
.prog-card{border-radius:var(--r2);padding:16px;background:rgba(255,255,255,0.05);border:1.5px solid var(--bdr);margin-bottom:10px;transition:all 0.22s;position:relative;overflow:hidden}
.prog-card.unlocked{border-color:rgba(200,77,255,0.5);background:linear-gradient(135deg,rgba(200,77,255,0.10),rgba(255,79,216,0.06))}
.prog-card-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.prog-card-ico{width:50px;height:50px;border-radius:14px;background:rgba(200,77,255,0.15);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.prog-card.unlocked .prog-card-ico{background:rgba(200,77,255,0.25)}
.prog-card-info{flex:1}
.prog-card-name{font-size:15px;font-weight:600;color:var(--white);margin-bottom:2px}
.prog-card-desc{font-size:11px;color:var(--gray);font-weight:300}
.prog-card-price{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.prog-price-tag{font-size:13px;font-weight:700;color:var(--accent)}
.prog-price-sep{font-size:11px;color:var(--gray2)}
.prog-unlock-btn{width:100%;padding:11px;border:none;border-radius:var(--r2);background:var(--grad);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(200,77,255,0.35);transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.prog-unlock-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(200,77,255,0.45)}
.prog-unlock-btn.done{background:linear-gradient(135deg,rgba(91,26,139,0.5),rgba(42,10,61,0.7));box-shadow:none;color:var(--gray);cursor:default}

/* VIP */
.vip-hero{background:linear-gradient(145deg,rgba(255,215,0,0.12),rgba(200,77,255,0.15));border:1.5px solid rgba(255,215,0,0.3);border-radius:var(--r3);padding:24px 20px;margin-bottom:18px;text-align:center}
.vip-icon{font-size:48px;margin-bottom:10px}
.vip-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--white);margin-bottom:6px}
.vip-sub{font-size:12px;color:var(--gray);font-weight:300;line-height:1.7}
.vip-benefits{background:rgba(255,255,255,0.04);border:1px solid var(--bdr);border-radius:var(--r2);padding:16px;margin-bottom:18px}
.vip-benefit-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.vip-benefit-item:last-child{border-bottom:none}
.vip-benefit-ico{font-size:18px;flex-shrink:0;margin-top:1px}
.vip-benefit-txt{font-size:13px;color:var(--gray);font-weight:300;line-height:1.5}
.vip-benefit-txt strong{color:var(--white);font-weight:600}
.vip-pricing{display:flex;gap:10px;margin-bottom:18px}
.vip-price-card{flex:1;background:rgba(255,255,255,0.05);border:1.5px solid var(--bdr);border-radius:var(--r2);padding:14px;text-align:center}
.vip-price-currency{font-size:22px;font-weight:700;color:var(--accent)}
.vip-price-label{font-size:10px;color:var(--gray2);font-weight:300;margin-top:2px}
.vip-activate-btn{width:100%;padding:15px;border:none;border-radius:var(--r2);background:linear-gradient(135deg,#FFD700,#FFA500);color:#1A0629;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 6px 28px rgba(255,215,0,0.30);transition:all 0.22s;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:0.3px}
.vip-activate-btn:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(255,215,0,0.40)}
.vip-active-banner{background:linear-gradient(135deg,rgba(255,215,0,0.18),rgba(200,77,255,0.15));border:1.5px solid rgba(255,215,0,0.4);border-radius:var(--r2);padding:16px;text-align:center;margin-bottom:14px;animation:bdIn 0.5s var(--ease-spring)}
.vip-active-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--gold);margin-bottom:4px}
.vip-active-sub{font-size:12px;color:var(--gray);font-weight:300}
.vip-wa-btn{width:100%;padding:13px;border:none;border-radius:var(--r2);background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(37,211,102,0.3);transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.vip-wa-btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(37,211,102,0.40)}

/* RANKING */
.rank-tabs{display:flex;background:rgba(255,255,255,0.05);border-radius:var(--r2);padding:4px;margin-bottom:18px;border:1px solid var(--bdr)}
.rank-tab{flex:1;padding:10px;border-radius:var(--r1);border:none;background:transparent;color:var(--gray2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;text-align:center}
.rank-tab.on{background:var(--grad);color:#fff;box-shadow:0 4px 16px rgba(200,77,255,0.30)}
.rank-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--r2);background:rgba(255,255,255,0.04);border:1px solid var(--bdr);margin-bottom:8px;transition:all 0.2s}
.rank-item.top3{border-color:rgba(200,77,255,0.35);background:linear-gradient(135deg,rgba(200,77,255,0.08),rgba(255,79,216,0.05))}
.rank-item.rank1{border-color:rgba(255,215,0,0.4);background:linear-gradient(135deg,rgba(255,215,0,0.10),rgba(200,77,255,0.08))}
.rank-item.is-me{border-color:rgba(200,77,255,0.5);box-shadow:0 0 0 1.5px rgba(200,77,255,0.2)}
.rank-pos{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;background:rgba(255,255,255,0.08)}
.rank-pos.gold{background:linear-gradient(135deg,#FFD700,#FFA500);color:#1A0629}
.rank-pos.silver{background:linear-gradient(135deg,#C0C0C0,#A0A0A0);color:#1A0629}
.rank-pos.bronze{background:linear-gradient(135deg,#CD7F32,#A0522D);color:#fff}
.rank-av{width:36px;height:36px;border-radius:50%;background:rgba(200,77,255,0.15);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:1.5px solid var(--bdr);overflow:hidden}
.rank-info{flex:1;min-width:0}
.rank-nm{font-size:13px;font-weight:600;color:var(--white)}
.rank-detail{font-size:10px;color:var(--gray2);font-weight:300;margin-top:1px}
.rank-score{font-size:14px;font-weight:700;color:var(--accent)}
.destaque-badge{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#FFD700,#FFA500);color:#1A0629;padding:3px 10px;border-radius:100px;font-size:9px;font-weight:700;letter-spacing:0.5px}
.week-section{background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,215,0,0.25);border-radius:var(--r2);padding:16px;margin-bottom:18px}
.week-section-title{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.notice-box{background:rgba(200,77,255,0.08);border:1.5px solid var(--bdr);border-radius:var(--r2);padding:14px;margin-bottom:16px}
.notice-box-title{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.notice-box-txt{font-size:12px;color:var(--gray);font-weight:300;line-height:1.6}
.tiebreaker-box{background:rgba(255,255,255,0.03);border:1px solid var(--bdr);border-radius:var(--r2);padding:14px;margin-top:16px}
.tiebreaker-title{font-size:10px;font-weight:700;color:var(--gray2);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.tiebreaker-item{display:flex;align-items:flex-start;gap:8px;font-size:11px;color:var(--gray);font-weight:300;line-height:1.5;margin-bottom:4px}

/* UNLOCK MODAL OPTIONS */
.unlock-option{display:flex;align-items:flex-start;gap:12px;padding:14px;border-radius:var(--r2);border:1.5px solid var(--bdr);background:rgba(255,255,255,0.04);cursor:pointer;transition:all 0.2s;margin-bottom:10px;text-align:left;width:100%}
.unlock-option:hover{border-color:var(--accent);background:rgba(200,77,255,0.10)}
.unlock-option.best{border-color:rgba(200,77,255,0.50);background:rgba(200,77,255,0.08)}
.unlock-option-ico{font-size:22px;flex-shrink:0;margin-top:1px}
.unlock-option-body{flex:1}
.unlock-option-title{font-size:13px;font-weight:600;color:var(--white);margin-bottom:2px}

/* PROGRESS LOGIC */
function getStatus(idx,inicialIdx,progresso,unlockedPaid){
  if(unlockedPaid&&unlockedPaid.includes(idx)) return 'open';
  if(idx<inicialIdx) return 'done';
  if(idx===inicialIdx) return 'open';
  const ciclos=idx-inicialIdx;
  const minimo=(ciclos-1)*40+36;
  return progresso>=minimo?'open':'lock';
}
function getLocalProg(progresso,idx,inicialIdx){
  if(idx<inicialIdx) return 40;
  if(idx===inicialIdx) return Math.min(progresso,40);
  const ciclo=idx-inicialIdx;
  const base=(ciclo-1)*40;
  return Math.min(Math.max(progresso-base,0),40);
}
function getNivelAtualIdx(inicialIdx,progresso){
  let idx=inicialIdx;
  for(let i=inicialIdx+1;i<LEVELS.length;i++){
    if(getStatus(i,inicialIdx,progresso,[])==='open') idx=i;
    else break;
  }
  return idx;
}
function diasParaProx(progresso,nivelAtualIdx,inicialIdx){
  const nextIdx=nivelAtualIdx+1;
  if(nextIdx>=LEVELS.length) return 0;
  const ciclos=nextIdx-inicialIdx;
  const minimo=(ciclos-1)*40+36;
  return Math.max(minimo-progresso,0);
}

function playSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    if(type==='ci'){
      o.frequency.setValueAtTime(523,ctx.currentTime);
      o.frequency.setValueAtTime(659,ctx.currentTime+0.1);
      o.frequency.setValueAtTime(784,ctx.currentTime+0.2);
      g.gain.setValueAtTime(0.22,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
      o.start();o.stop(ctx.currentTime+0.5);
    } else if(type==='vip'){
      // Premium sparkle — staccato ascending shimmer
      o.type='sine';
      const freqs=[880,1108,1319,1568,2093];
      freqs.forEach((f,i)=>{
        const t=ctx.currentTime+i*0.1;
        o.frequency.setValueAtTime(f,t);
        g.gain.setValueAtTime(0.18,t);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.09);
      });
      o.start();o.stop(ctx.currentTime+0.65);
      // Sparkle shimmer layer
      const o2=ctx.createOscillator(),g2=ctx.createGain();
      o2.type='triangle';o2.connect(g2);g2.connect(ctx.destination);
      o2.frequency.setValueAtTime(2637,ctx.currentTime);
      o2.frequency.setValueAtTime(3136,ctx.currentTime+0.2);
      g2.gain.setValueAtTime(0.09,ctx.currentTime);
      g2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.6);
      o2.start();o2.stop(ctx.currentTime+0.6);
    } else {
      [523,784,1047,1319].forEach((f,i)=>o.frequency.setValueAtTime(f,ctx.currentTime+i*0.15));
      g.gain.setValueAtTime(0.28,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.9);
      o.start();o.stop(ctx.currentTime+0.9);
    }
  }catch(e){}
}

/* LOGIN */
function LoginPage({onLogin,lang,setLang}){
  const t=T[lang];
  const [nome,setNome]=useState('');
  const [email,setEmail]=useState('');
  const [nivel,setNivel]=useState(null);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const [isReturning,setIsReturning]=useState(false);
  const groups=[
    {k:'i',lb:t.g_i,items:LOGIN_LEVELS.filter(l=>l.group==='i')},
    {k:'m',lb:t.g_m,items:LOGIN_LEVELS.filter(l=>l.group==='m')},
    {k:'a',lb:t.g_a,items:LOGIN_LEVELS.filter(l=>l.group==='a')},
  ];
  const handleEmailChange=(e)=>{
    const val=e.target.value;
    setEmail(val);
    if(val.includes('@')){
      const ex=db.getUser();
      if(ex&&ex.email===val.trim().toLowerCase()){setIsReturning(true);setNome(ex.nome);}
      else setIsReturning(false);
    } else setIsReturning(false);
  };
  const go=()=>{
    if(!nome.trim()) return setErr(t.e_nome);
    if(!email.trim()||!email.includes('@')) return setErr(t.e_email);
    const ex=db.getUser();
    const returning=ex&&ex.email===email.trim().toLowerCase();
    if(!returning&&!nivel) return setErr(t.e_lv);
    setErr('');setLoading(true);
    setTimeout(()=>{
      let user;
      if(returning){user=ex;}
      else{
        user={nome:nome.trim(),email:email.trim().toLowerCase(),nivel_inicial:nivel,progresso:0,ultimo_checkin:null,status:'ativo',created_at:new Date().toISOString(),avatar:null,plan:'planfit',nivel_start_date:new Date().toISOString()};
        db.saveUser(user);
      }
      setLoading(false);onLogin(user);
    },700);
  };
  return(
    <div className="login">
      <div className="lang-row">
        {['pt','es','en'].map(l=>(
          <button key={l} className={`lbtn ${lang===l?'on':''}`} onClick={()=>setLang(l)}>{l.toUpperCase()}</button>
        ))}
      </div>
      <div className="login-hero">
        <img src="https://i.imgur.com/RcgEkNK.png" alt="Planfit40" className="login-logo" onError={e=>{e.target.style.display='none'}}/>
        <div className="login-tag">{t.tagline}</div>
      </div>
      <div className="card">
        <div className="card-title">{t.wc}</div>
        <div className="card-sub">{t.card_sub}</div>
        <label className="fl">{t.your_name}</label>
        <input className="fi" placeholder={t.name_ph} value={nome} onChange={e=>setNome(e.target.value)} disabled={isReturning}/>
        <label className="fl">{t.email}</label>
        <input className="fi" type="email" placeholder="you@email.com" value={email} onChange={handleEmailChange}/>
        {isReturning&&(
          <div style={{fontSize:11,color:'var(--accent)',fontWeight:500,marginBottom:12,padding:'8px 12px',background:'rgba(200,77,255,0.10)',borderRadius:10,border:'1px solid var(--bdr)'}}>
            ✦ {(T[lang]||T.pt).welcome_back}
          </div>
        )}
        {!isReturning&&(
          <div className="lvl-sec">
            <div className="lvl-sec-lbl">{t.sel_lv}</div>
            {groups.map(g=>(
              <div key={g.k} className="lvl-group">
                <div className="lvl-group-name">{g.lb}</div>
                {g.items.map(l=>(
                  <div key={l.id} className={`lo ${nivel===l.id?'on':''}`} onClick={()=>setNivel(l.id)}>
                    <div className="lo-rb"/>
                    <div className="lo-ico">{l.icon}</div>
                    <div><div className="lo-nm">{l.n}</div><div className="lo-ds">{l.desc}</div></div>
                  </div>
                ))}
              </div>
            ))}
          </div>
        )}
        {err&&<div className="err">{err}</div>}
        <button className="btn-go" onClick={go} disabled={loading}>
          {loading&&<span className="spinner"/>}{loading?t.entering:t.enter}
        </button>
      </div>
    </div>
  );
}

/* DASHBOARD */
function DashboardPage({user,lang,t,setLang,onRegisterClick,onLogout,onSwap,hasSwapped,onOpenInstrucoes}){
  const ii=LEVELS.findIndex(l=>l.id===user.nivel_inicial);
  const ni=getNivelAtualIdx(ii,user.progresso);
  const nivel=LEVELS[ni];
  const local=getLocalProg(user.progresso,ni,ii);
  const pct=Math.round((local/40)*100);
  const faltam=diasParaProx(user.progresso,ni,ii);
  const jaFezHoje=user.ultimo_checkin===TODAY;
  const checkins=db.getCheckins();
  const now=new Date();
  const dateStr=now.toLocaleDateString(lang==='pt'?'pt-BR':lang==='es'?'es-ES':'en-US',{weekday:'long',day:'numeric',month:'long'});
  const calDays=Array.from({length:30},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(29-i));return{date:d.toDateString(),num:d.getDate(),isHoje:d.toDateString()===TODAY};});
  const isVip=db.isVip();

  // Days since account created — for swap button visibility
  const diasDesdeInicio=user.created_at

    const pool=[...apiRanking.filter(u=>u.plan===plan),(plan===userPlan?userEntry:null)].filter(Boolean);

    const srcLang=post.lang||'pt';
    if(srcLang===lang){return;}
    if(translations[pid]?.text){
      setTranslations(prev=>({...prev,[pid]:{...prev[pid],showing:!prev[pid].showing}}));
      return;
    }
    setTranslations(prev=>({...prev,[pid]:{loading:true,showing:false,text:null}}));
    try{
      const res=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(post.caption)}&langpair=${srcLang}|${lang}`);
      const data=await res.json();
      const translated=data?.responseData?.translatedText||post.caption;
      setTranslations(prev=>({...prev,[pid]:{loading:false,showing:true,text:translated}}));
    }catch{
      setTranslations(prev=>({...prev,[pid]:{loading:false,showing:false,text:null}}));
    }
  };

  return(
    <div className="page">
      <div className="hdr">
        <div className="hdr-top"><div><div className="hdr-eye">PlanFit</div><div className="hdr-name">{t.community}</div></div></div>
      </div>
      <div className="pc">
        <button
          className={`reg-btn ${jaFezHoje?'done':''}`}
          onClick={jaFezHoje?undefined:onRegisterClick}
          disabled={jaFezHoje}
        >
          {jaFezHoje?t.reg_already:'📸 '+t.reg_workout}
        </button>

        {postsLoading&&<div className="empty"><div className="empty-ic">⏳</div><div className="empty-tx">Carregando publicações...</div></div>}
        {postsError&&!postsLoading&&<div className="empty"><div className="empty-ic">⚠️</div><div className="empty-tx">Erro ao carregar dados</div></div>}

        {posts.map(post=>{
          const trState=translations[post.id]||{};
          const postSrcLang=post.lang||'pt';
          const needsTranslation=postSrcLang!==lang;
          const displayCaption=trState.showing&&trState.text?trState.text:post.caption;
          return(
          <div key={post.id} className="thread-post fade-in">
            <div className="thread-post-hdr">
              <div onClick={()=>onViewProfile(post)} style={{cursor:'pointer'}}>
                <AvDisp avatarUrl={post.avatar_url} emoji={post.av} size={40} vip={post.vip}/>
              </div>
              <div className="thread-meta" style={{marginLeft:10}}>
                <div className="thread-nm-row">
                  <span className="thread-nm" onClick={()=>onViewProfile(post)}>{post.nm}</span>
                  {post.vip&&<span className="thread-vip-badge">⭐ VIP</span>}
                </div>
                <div className="thread-workout-label">🏋️ {post.workout} {t.comm_done}</div>
                <div className="thread-time">{post.time}</div>
              </div>
            </div>

            {post.photo?(
              <div className="thread-photo"><img src={post.photo} alt="workout"/></div>
            ):(
              <div className="thread-photo" style={{minHeight:100}}>
                <div className="thread-photo-placeholder"><span style={{fontSize:32}}>🏋️</span><span style={{fontSize:12}}>{t.comm_workout_done}</span></div>
              </div>
            )}

            <div className="thread-caption">{displayCaption}</div>

            {needsTranslation&&(
              <button
                onClick={()=>translatePost(post)}
                style={{background:'none',border:'none',color:'var(--accent)',fontSize:11,cursor:'pointer',padding:'2px 0 6px',fontFamily:"'DM Sans',sans-serif",fontWeight:500}}
              >
                {trState.loading?t.comm_translating:trState.showing?t.comm_see_original:t.comm_translate}
              </button>
            )}

            <div className="thread-actions">
              <button className={`thread-action-btn ${post.liked?'liked':''}`} onClick={()=>handleLike(post.id)}>
                <span className="heart-ic">{post.liked?'❤️':'🤍'}</span>{post.likes}
              </button>
              <button className="thread-action-btn" onClick={()=>toggleComments(post.id)}>
                💬 {post.comments.length}
              </button>
            </div>

            {post.showComments&&(
              <div className="thread-replies">
                {post.comments.map(c=>(
                  <div key={c.id} className="thread-reply">
                    <div className="thread-reply-av">
                      {c.avatar_url?<img src={c.avatar_url} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<span>{c.av}</span>}
                    </div>
                    <div className="thread-reply-body">
                      <div className="thread-reply-nm">{c.nm}</div>
                      <div className="thread-reply-txt">{c.text}</div>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        <div className="thread-reply-time">{c.time}</div>
                        <button className="thread-reply-btn" onClick={()=>toggleReplyInput(post.id,c.id)}>
                          {c.showReplyInput?t.cancel:t.comm_reply}
                        </button>
                      </div>
                      {(c.replies||[]).length>0&&(
                        <div className="thread-nested-replies">
                          {(c.replies||[]).map(r=>(
                            <div key={r.id} className="thread-nested-reply">
                              <div className="thread-nested-reply-av">
                                {r.avatar_url?<img src={r.avatar_url} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<span>{r.av}</span>}
                              </div>
                              <div style={{flex:1}}>
                                <div className="thread-reply-nm" style={{fontSize:11}}>{r.nm}</div>
                                <div className="thread-reply-txt" style={{fontSize:11}}>{r.text}</div>
                                <div className="thread-reply-time">{r.time}</div>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                      {c.showReplyInput&&(
                        <div className="thread-reply-input">
                          <textarea placeholder={t.comm_reply_to(c.nm)} value={c.replyInput||''} onChange={e=>updateReplyInput(post.id,c.id,e.target.value)} rows={1}/>
                          <button onClick={()=>submitReply(post.id,c.id)}>{t.comm_send}</button>
                        </div>
                      )}
                    </div>
                  </div>
                ))}
                <div className="thread-comment-input">
                  <textarea placeholder={t.comm_write_comment} value={post.commentInput||''} onChange={e=>updateCommentInput(post.id,e.target.value)} rows={1}/>
                  <button onClick={()=>submitComment(post.id)}>{t.comm_send}</button>
                </div>
              </div>
            )}
          </div>
          );
        })}
      </div>
    </div>
  );
}

/* PERFIL */
function PerfilPage({user,lang,t,onLogout,onGoExtras,onAvatarChange}){
  const ii=LEVELS.findIndex(l=>l.id===user.nivel_inicial);
  const ni=getNivelAtualIdx(ii,user.progresso);
  const nivel=LEVELS[ni];
  const inicialNivel=LEVELS.find(l=>l.id===user.nivel_inicial);
  const nOpen=LEVELS.filter((_,i)=>getStatus(i,ii,user.progresso,db.getUnlockedPaid())!=='lock').length;
  const local=getLocalProg(user.progresso,ni,ii);
  const isVip=db.isVip();
  const [unlockedExtras]=useState(()=>db.getUnlockedExtras());
  const myProducts=EXTRA_PROGRAMS.filter(p=>unlockedExtras.includes(p.id));

  return(

          onRemove={()=>{onAvatarChange(null);setShowAvPicker(false);}}

      <div className="hdr">
        <div className="hdr-top"><div><div className="hdr-eye">{t.prf_eye}</div><div className="hdr-name">{t.prf_name}</div></div></div>
      </div>
      <div className="pc">
        <div className="prf-top">
          <div className={`prf-av-wrap ${isVip?'vip':''}`} onClick={()=>setShowAvPicker(true)}>
            {user.avatar
              ?<img src={user.avatar} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
              :<span style={{fontSize:34}}>{isVip?'👑':'🌿'}</span>
            }
            <div className="av-overlay">📷</div>
          </div>
          <div className="prf-nm">{user.nome}</div>
          <div className="prf-lv">{nivel.icon} {nivel.n}</div>
          {isVip&&<div style={{marginTop:8}}><span className="badge badge-vip">⭐ VIP PLANFIT</span></div>}
        </div>
        <div className="stat-g">
          <div className="stat-b"><div className="stat-v">{user.progresso}</div><div className="stat-l">{t.t_days}</div></div>
          <div className="stat-b"><div className="stat-v">{nOpen}</div><div className="stat-l">{t.t_lvs}</div></div>
          <div className="stat-b"><div className="stat-v">{local}</div><div className="stat-l">{t.t_inlv}</div></div>

        <div className="info-c">

          <div className="info-row"><div className="info-k">{t.ini_lv}</div><div className="info-v">{inicialNivel?.icon} {inicialNivel?.n}</div></div>
          <div className="info-row"><div className="info-k">{t.status}</div><div className="info-v" style={{color:'var(--accent)'}}>{t.active}</div></div>

        </div>

          <div className="meus-prod-title">✦ {lbl.title}</div>
          {myProducts.length>0?(

      </div>
    </div>
  );
}

/* APP ROOT */
function App(){
  const [user,setUser]=useState(()=>{
    const u=db.getUser();
    if(u){
      let migrated={...u};
      let changed=false;
      if(!u.plan){migrated.plan=db.isVip()?'vip':'planfit';changed=true;}
      if(!u.nivel_start_date){migrated.nivel_start_date=u.created_at||new Date().toISOString();changed=true;}
      if(changed){db.saveUser(migrated);return migrated;}
    }
    return u;
  });
  const [lang,setLang]=useState(()=>db.getLang());
  const [page,setPage]=useState('dashboard');
  const [ciModal,setCiModal]=useState(false);
  const [luModal,setLuModal]=useState(null);
  const [shareCard,setShareCard]=useState(null);
  const [swapModal,setSwapModal]=useState(false);
  const [viewProfile,setViewProfile]=useState(null);
  const [hasSwapped,setHasSwapped]=useState(()=>db.getSwapped());
  const [showWRModal,setShowWRModal]=useState(false);
  const [showInstrucoes,setShowInstrucoes]=useState(false);
  const [isVip,setIsVip]=useState(()=>db.isVip());
  const [showVipCel,setShowVipCel]=useState(false);
  const [toast,setToast]=useState('');

  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(''),2500);};

  const handleActivateVip=useCallback(()=>{
    if(isVip) return;
    db.setVip();
    setIsVip(true);
    setShowVipCel(true);
    playSound('vip');
    // Move user from PlanFit ranking to VIP ranking
    const upd={...user,plan:'vip'};
    db.saveUser(upd);
    setUser(upd);
    // Sync to API
    api.post('/api/vip',{userId:user.email}).catch(()=>{});
  },[isVip,user]);

  const openRegisterModal=useCallback(()=>{
    if(!user) return;
    if(user.ultimo_checkin===TODAY){
      showToast(T[lang].reg_already);
      return;
    }
    setShowWRModal(true);
  },[user,lang]);

  // Posts — loaded from API
  const [posts,setPosts]=useState([]);
  const [postsLoading,setPostsLoading]=useState(true);
  const [postsError,setPostsError]=useState(false);

  // Ranking — loaded from API
  const [apiRanking,setApiRanking]=useState([]);
  const [rankLoading,setRankLoading]=useState(true);
  const [rankError,setRankError]=useState(false);

  const hydratePosts=(raw)=>raw.map(p=>({
    ...p,
    liked:false,
    commentInput:'',
    showComments:false,
    comments:(p.comments||[]).map(c=>({...c,replyInput:'',showReplyInput:false,replies:c.replies||[]})),
  }));

  useEffect(()=>{
    setPostsLoading(true);
    api.get('/api/posts')
      .then(d=>{setPosts(hydratePosts(d.posts||[]));setPostsError(false);})
      .catch(()=>setPostsError(true))
      .finally(()=>setPostsLoading(false));
  },[]);

  useEffect(()=>{
    setRankLoading(true);
    api.get('/api/ranking')
      .then(d=>{setApiRanking(d.ranking||[]);setRankError(false);})
      .catch(()=>setRankError(true))
      .finally(()=>setRankLoading(false));
  },[]);

  const savePosts=(updater)=>{
    setPosts(prev=>typeof updater==='function'?updater(prev):updater);
  };

  const handleLang=useCallback((l)=>{setLang(l);db.setLang(l);},[]);

  // UNIFIED registerWorkout — called from Dashboard and Community
  const registerWorkout=useCallback(({photo='',caption=''}={})=>{
    if(!user||user.ultimo_checkin===TODAY) return;
    const isVip=db.isVip();
    const ii=LEVELS.findIndex(l=>l.id===user.nivel_inicial);
    const prevNi=getNivelAtualIdx(ii,user.progresso);
    const upd={...user,progresso:user.progresso+1,ultimo_checkin:TODAY};
    const newNi=getNivelAtualIdx(ii,upd.progresso);
    if(newNi>prevNi) upd.nivel_start_date=new Date().toISOString();
    db.saveUser(upd);
    db.addCheckin(TODAY);
    setUser(upd);
    playSound('ci');

    // Create community post locally and sync to API
    const nivel=LEVELS[prevNi];
    const defaultCaption=(T[lang]||T.pt).comm_workout_done+' 💪';
    const newPost={
      id:Date.now(),
      av:isVip?'👑':'🌸',
      avatar_url:user.avatar||null,
      nm:user.nome,
      vip:isVip,
      time:'agora',
      workout:nivel.n,
      photo:photo||null,
      caption:caption||defaultCaption,
      likes:0,liked:false,
      comments:[],showComments:false,commentInput:'',
      lang:lang||'pt'
    };
    savePosts(prev=>[newPost,...prev]);

    // Sync to API (non-blocking)
    api.post('/api/register-workout',{userId:user.email}).catch(()=>{});
    api.post('/api/posts',{
      userId:user.email,nm:user.nome,av:isVip?'👑':'🌸',
      avatar_url:user.avatar||null,vip:isVip,workout:nivel.n,
      caption:caption||defaultCaption,photo:photo||null,lang:lang||'pt',time:'agora',
    }).catch(()=>{});

    setShowWRModal(false);
    showToast((T[lang]||T.pt).toast_reg);
    setCiModal(true);
    if(newNi>prevNi){
      setTimeout(()=>{setCiModal(false);playSound('lu');setLuModal(LEVELS[newNi]);},2200);
    }
    // Share card after modal
    setTimeout(()=>{
      setShareCard({workout:nivel.n,isVip,nome:user.nome,date:new Date().toLocaleDateString('pt-BR')});
    },3000);
  },[user,lang]);

  // Swap workout
  const handleSwap=(targetIdx)=>{
    if(!user) return;
    const newNivelId=LEVELS[targetIdx].id;
    const upd={...user,nivel_inicial:newNivelId};
    db.saveUser(upd);
    db.setSwapped();
    setUser(upd);
    setHasSwapped(true);
    setSwapModal(false);
    showToast(T[lang].swap_done);
    // Sync to API
    api.post('/api/swap-workout',{userId:user.email,newWorkout:LEVELS[targetIdx].n}).catch(()=>{});
  };

  // Avatar change
  const handleAvatarChange=(dataUrl)=>{
    if(!user) return;
    const upd={...user,avatar:dataUrl};
    db.saveUser(upd);
    setUser(upd);
    // Update posts by this user to show new avatar
    savePosts(prev=>prev.map(p=>p.nm===user.nome?{...p,avatar_url:dataUrl}:p));
  };

  const t=T[lang]||T.pt;

  if(!user) return(
    <div className="app">
      <LoginPage onLogin={u=>setUser(u)} lang={lang} setLang={handleLang}/>
    </div>
  );

  const handleLogout=()=>{db.clearUser();setUser(null);};

  const renderPage=()=>{
    switch(page){
      case 'dashboard': return(
        <DashboardPage
          user={user} lang={lang} t={t} setLang={handleLang}
          onRegisterClick={openRegisterModal}
          onLogout={handleLogout}
          onSwap={()=>setSwapModal(true)}
          hasSwapped={hasSwapped}
          onOpenInstrucoes={()=>setShowInstrucoes(true)}
        />
      );
      case 'treinos':    return <TreinosPage user={user} lang={lang} t={t} apiRanking={apiRanking}/>;
      case 'programas':  return <ProgramasPage lang={lang} t={t}/>;
      case 'comunidade': return(
        <ComunidadePage
          user={user} lang={lang} t={t}
          posts={posts}
          postsLoading={postsLoading}
          postsError={postsError}
          onPostsChange={savePosts}
          onRegisterClick={openRegisterModal}
          onViewProfile={(post)=>setViewProfile(post)}
        />
      );
      case 'ranking':    return <RankingPage user={user} lang={lang} t={t} apiRanking={apiRanking} rankLoading={rankLoading} rankError={rankError}/>;
      case 'vip':        return <VipPage lang={lang} t={t} isVip={isVip} onActivate={handleActivateVip}/>;
      case 'perfil':     return(
        <PerfilPage
          user={user} lang={lang} t={t}
          onLogout={handleLogout}
          onGoExtras={()=>setPage('programas')}
          onAvatarChange={handleAvatarChange}
        />
      );
      default: return null;
    }
  };

  return(
    <div className={`app${isVip?' vip-theme':''}`}>
      {toast&&<div className="toast">{toast}</div>}
      {ciModal&&<CheckinModal user={user} lang={lang} t={t} onClose={()=>setCiModal(false)}/>}
      {luModal&&<LevelUpModal nivel={luModal} lang={lang} t={t} onClose={()=>setLuModal(null)}/>}
      {shareCard&&<ShareCard card={shareCard} onClose={()=>setShareCard(null)}/>}
      {showWRModal&&(
        <WorkoutRegisterModal
          user={user} lang={lang} t={t}
          onClose={()=>setShowWRModal(false)}
          onPublish={(opts)=>registerWorkout(opts)}
        />
      )}
      {showInstrucoes&&(
        <InstrucoesPage lang={lang} t={t} onClose={()=>setShowInstrucoes(false)}/>
      )}
      {showVipCel&&(
        <VipCelebrationModal t={t} onClose={()=>setShowVipCel(false)}/>
      )}
      {swapModal&&<SwapWorkoutModal user={user} t={t} onClose={()=>setSwapModal(false)} onSwap={handleSwap}/>}
      {viewProfile&&(
        <UserProfileModal
          profile={viewProfile}
          allPosts={posts}
          onClose={()=>setViewProfile(null)}
          onLike={(id)=>savePosts(prev=>prev.map(p=>p.id===id?{...p,likes:p.liked?p.likes-1:p.likes+1,liked:!p.liked}:p))}
          onViewProfile={(post)=>setViewProfile(post)}
          user={user} lang={lang} t={t}
        />
      )}
      <div className="fade-in">{renderPage()}</div>
      <BottomNav active={page} setActive={setPage} t={t}/>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
  /* ================= API CONNECT ================= */

const API_URL = "https://planfitapp-production.up.railway.app";

const api = {
  get: async (path) => {
    const res = await fetch(`${API_URL}/api${path}`);
    if (!res.ok) throw new Error("API error");
    return res.json();
  },

  post: async (path, body) => {
    const res = await fetch(`${API_URL}/api${path}`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });

    if (!res.ok) throw new Error("API error");
    return res.json();
  }
};

/* ================= WORKOUT ================= */

window.registerWorkout = async function(opts){
  try{
    const post = await api.post("/workout",{
      userId: window.user?.id || "guest",
      caption: opts?.caption || "",
      photo: opts?.photo || null,
      createdAt: Date.now()
    });

    if(window.setPosts){
      window.setPosts(prev => [post,...prev]);
    }

  }catch(e){
    console.log("workout error",e);
  }
};

/* ================= POSTS ================= */

window.loadPosts = async function(){
  try{
    const data = await api.get("/posts");
    if(window.setPosts){
      window.setPosts(data);
    }
  }catch(e){
    console.log("posts error",e);
  }
};

/* ================= RANKING ================= */

window.loadRanking = async function(){
  try{
    const data = await api.get("/ranking");
    if(window.setRanking){
      window.setRanking(data);
    }
  }catch(e){
    console.log("ranking error",e);
  }
};

/* ================= AUTO LOAD ================= */

setTimeout(()=>{
  if(window.loadPosts) loadPosts();
  if(window.loadRanking) loadRanking();
},1000);
</script>
